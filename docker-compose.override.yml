services:
  weather_db:
    image: postgres:15
    environment:
      POSTGRES_DB: weather_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - weather_db_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - airflow
  
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - weather_db
    networks:
      - airflow

volumes:
  weather_db_data: